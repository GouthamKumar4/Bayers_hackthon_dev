name: Simple App CI

on:
  push:
    paths:
      - "simple_app/**"
      - "tests_simple/**"
      - "Dockerfile.simple"
      - "requirements.txt"
      - ".github/workflows/simple-app-ci.yml"
  pull_request:
    paths:
      - "simple_app/**"
      - "tests_simple/**"
      - "Dockerfile.simple"
      - "requirements.txt"
      - ".github/workflows/simple-app-ci.yml"

jobs:
  simple-build-test:
    name: Simple App Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run simple app tests
        run: python -m unittest discover -s tests_simple -v

      - name: Build simple app Docker image
        run: docker build -f Dockerfile.simple -t booking-simple:${{ github.sha }} .
