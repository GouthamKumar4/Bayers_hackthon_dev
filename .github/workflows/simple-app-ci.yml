name: Simple App Sequential CI + DevSecOps

on:
  push:
    paths:
      - "simple_app/**"
      - "tests_simple/**"
      - "Dockerfile.simple"
      - "requirements.txt"
      - ".github/workflows/simple-app-ci.yml"
  pull_request:
    paths:
      - "simple_app/**"
      - "tests_simple/**"
      - "Dockerfile.simple"
      - "requirements.txt"
      - ".github/workflows/simple-app-ci.yml"

env:
  SIMPLE_IMAGE_NAME: booking-simple
  PYTHON_VERSION: "3.11"

jobs:
  simple-ci:
    name: Simple App Sequential CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for Sonar)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run simple app tests with coverage
        run: |
          coverage run -m unittest discover -s tests_simple -v
          coverage xml

      - name: SonarQube scan (simple app scope)
        if: ${{ secrets.SONAR_TOKEN != '' }}
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL != '' && vars.SONAR_HOST_URL || 'https://sonarcloud.io' }}
        with:
          args: >
            -Dsonar.sources=simple_app
            -Dsonar.tests=tests_simple
            -Dsonar.python.coverage.reportPaths=coverage.xml

      - name: SonarQube quality gate
        if: ${{ secrets.SONAR_TOKEN != '' }}
        uses: SonarSource/sonarqube-quality-gate-action@master
        timeout-minutes: 10
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: booking-simple
          path: .
          format: "ALL"

      - name: Upload dependency-check report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report-simple
          path: reports/

      - name: Trivy filesystem scan (simple app)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Build simple app Docker image
        run: docker build -f Dockerfile.simple -t ${{ env.SIMPLE_IMAGE_NAME }}:${{ github.sha }} .

      - name: Trivy image scan (simple app image)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ env.SIMPLE_IMAGE_NAME }}:${{ github.sha }}
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: sbom-simple.spdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-simple
          path: sbom-simple.spdx.json
